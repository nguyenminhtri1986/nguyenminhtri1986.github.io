<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc Nghiệm Tin Học 10 - Thầy Minh Trí</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; line-height: 1.6; padding: 20px; }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .info-section { margin-bottom: 25px; display: flex; gap: 10px; }
        input[type="text"] { padding: 10px; border: 1px solid #ddd; border-radius: 5px; flex: 1; }
        .question { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid #3498db; }
        .options label { display: block; cursor: pointer; padding: 5px 0; }
        button { display: block; width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #2ecc71; }
        #status { text-align: center; font-weight: bold; margin-top: 20px; color: #e67e22; }
   /* Màu cho câu đúng và sai */
.correct { background-color: #d4edda !important; border-left: 5px solid #28a745 !important; color: #155724; }
.wrong { background-color: #f8d7da !important; border-left: 5px solid #dc3545 !important; color: #721c24; }

/* Ẩn nút làm lại lúc đầu, chỉ hiện sau khi nộp bài */
#resetBtn { display: none; background: #3498db; margin-top: 10px; }
#submitBtn:disabled { background: #95a5a6; cursor: not-allowed; }

.feedback { font-size: 0.9em; font-weight: bold; margin-top: 5px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>BÀI KIỂM TRA TRẮC NGHIỆM</h1>
    
    <div class="info-section">
        <input type="text" id="studentName" placeholder="Họ và tên học sinh" required>
        <input type="text" id="studentClass" placeholder="Lớp (Vd: 10A1)" required>
    </div>

    <div class="question">
        <p><strong>Câu 1:</strong> Trong Python, để in dữ liệu ra màn hình ta dùng hàm nào?</p>
        <div class="options">
            <label><input type="radio" name="q1" value="0"> input()</label>
            <label><input type="radio" name="q1" value="1"> print()</label>
            <label><input type="radio" name="q1" value="0"> output()</label>
        </div>
    </div>

    <div class="question">
        <p><strong>Câu 2:</strong> Thiết bị nào sau đây là thiết bị vào của máy tính?</p>
        <div class="options">
            <label><input type="radio" name="q2" value="1"> Bàn phím</label>
            <label><input type="radio" name="q2" value="0"> Màn hình</label>
            <label><input type="radio" name="q2" value="0"> Máy in</label>
        </div>
    </div>
<button id="submitBtn" onclick="chamDiem()">Nộp Bài & Lưu Kết Quả</button>
<button id="resetBtn" onclick="lamLai()">Làm bài mới (Reset)</button>
<p id="status"></p>    
</div>
<script>
function chamDiem() {
    const nameInput = document.getElementById('studentName');
    const classInput = document.getElementById('studentClass');
    const submitBtn = document.getElementById('submitBtn');
    const resetBtn = document.getElementById('resetBtn');
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxsKAYFMG4WG8Q06KNxooCIuQfbqVSGHJwQ_1K7rAunap7V2ratV2Y3RoKG3DgHJoFk/exec';

    if (!nameInput.value || !classInput.value) {
        alert("Thầy nhắc em nhập đủ Họ tên và Lớp nhé!");
        return;
    }

    let score = 0;
    const questions = document.querySelectorAll('.question');
    
    questions.forEach((q) => {
        const selected = q.querySelector('input[type="radio"]:checked');
        const allRadios = q.querySelectorAll('input[type="radio"]');
        
        // Khóa không cho sửa đáp án sau khi nộp
        allRadios.forEach(r => r.disabled = true);

        if (selected && selected.value === "1") {
            score += 5;
            q.classList.add('correct');
        } else {
            q.classList.add('wrong');
        }
    });

    document.getElementById('status').innerText = "Đang gửi kết quả về cho thầy Trí...";
    submitBtn.disabled = true; // Khóa nút nộp bài

    // Gửi dữ liệu sang Google Sheets
    fetch(scriptURL, {
        method: 'POST',
        mode: 'no-cors',
        cache: 'no-cache',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: nameInput.value, class: classInput.value, score: score })
    })
    .then(() => {
        document.getElementById('status').innerText = "Đã lưu kết quả: " + score + " điểm. Em hãy xem lại các câu sai màu đỏ nhé!";
        resetBtn.style.display = "block"; // HIỆN NÚT RESET ĐỂ XÁC NHẬN
    });
}

function lamLai() {
    if (confirm("Em có chắc chắn muốn xóa kết quả cũ và làm bài mới không?")) {
        location.reload(); // Tải lại trang để làm mới hoàn toàn
    }
}
    // 1. Chặn chuột phải
document.addEventListener('contextmenu', event => event.preventDefault());

// 2. Chặn các phím tắt phổ biến (F12, Ctrl+Shift+I, Ctrl+U, Ctrl+C)
document.onkeydown = function(e) {
    if (e.keyCode == 123) { // F12
        return false;
    }
    if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { // Ctrl+Shift+I
        return false;
    }
    if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { // Ctrl+Shift+J
        return false;
    }
    if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { // Ctrl+U (Xem source)
        return false;
    }
    if (e.ctrlKey && e.keyCode == 'C'.charCodeAt(0)) { // Ctrl+C (Copy)
        alert("Thầy nhắc: Không sao chép nội dung bài kiểm tra nhé!");
        return false;
    }
};
    </script>
</body>
</html>
