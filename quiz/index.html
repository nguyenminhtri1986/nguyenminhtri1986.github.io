<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Trắc Nghiệm - Thầy Minh Trí</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --success-color: #16a34a;
            --error-color: #dc2626;
            --bg-color: #f1f5f9;
        }

        /* Chống bôi đen toàn trang */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .quiz-card {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 1.5rem;
            color: #1e293b;
            text-align: center;
            margin-bottom: 25px;
        }

        /* Giao diện nhập thông tin: Mobile xếp dọc, Web xếp ngang */
        .info-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        @media (min-width: 480px) {
            .info-group { flex-direction: row; }
        }

        input[type="text"] {
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
            user-select: text; /* Cho phép nhập liệu */
            -webkit-user-select: text;
        }

        input[type="text"]:focus { border-color: var(--primary-color); }

        /* Câu hỏi */
        .question-box {
            background: #ffffff;
            border: 2px solid #f8fafc;
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        .question-text {
            font-weight: 600;
            margin-bottom: 12px;
            display: block;
        }

        .option {
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 5px;
            transition: background 0.2s;
        }

        .option:hover { background: #f8fafc; }

        input[type="radio"] {
            margin-right: 12px;
            width: 18px;
            height: 18px;
        }

        /* Màu sắc đúng sai */
        .correct { background-color: #dcfce7 !important; border-color: #b91c1c; border: 2px solid #22c55e !important; }
        .wrong { background-color: #fee2e2 !important; border-color: #b91c1c; border: 2px solid #ef4444 !important; }

        /* Nút bấm */
        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        #submitBtn { background-color: var(--primary-color); color: white; }
        #resetBtn { background-color: #64748b; color: white; display: none; }
        
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #status {
            text-align: center;
            font-size: 0.9rem;
            margin-top: 15px;
            color: var(--primary-color);
        }
    </style>
</head>
<body>

<div class="quiz-card">
    <h1>📝 Kiểm Tra Tin Học 10</h1>
    
    <div class="info-group">
        <input type="text" id="studentName" placeholder="Họ và tên..." required>
        <input type="text" id="studentClass" placeholder="Lớp..." required>
    </div>

    <div id="quiz-container">
        <div class="question-box">
            <span class="question-text">Câu 1: Thiết bị nào dùng để xuất dữ liệu?</span>
            <label class="option"><input type="radio" name="q1" value="0"> Bàn phím</label>
            <label class="option"><input type="radio" name="q1" value="1"> Màn hình</label>
            <label class="option"><input type="radio" name="q1" value="0"> Chuột</label>
        </div>

        <div class="question-box">
            <span class="question-text">Câu 2: Phím tắt để sao chép (Copy) là gì?</span>
            <label class="option"><input type="radio" name="q2" value="0"> Ctrl + V</label>
            <label class="option"><input type="radio" name="q2" value="1"> Ctrl + C</label>
            <label class="option"><input type="radio" name="q2" value="0"> Ctrl + X</label>
        </div>
    </div>

    <div class="btn-stack">
        <button id="submitBtn" onclick="chamDiem()">Nộp Bài</button>
        <button id="resetBtn" onclick="lamLai()">Làm Bài Mới</button>
    </div>
    
    <p id="status"></p>
</div>



<script>
    // CHỐNG COPY & PHÍM TẮT
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = e => {
        if (e.keyCode == 123 || (e.ctrlKey && (e.keyCode == 85 || e.keyCode == 67 || e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)))) 
            return false;
    };

    function chamDiem() {
        const name = document.getElementById('studentName').value;
        const lop = document.getElementById('studentClass').value;
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxsKAYFMG4WG8Q06KNxooCIuQfbqVSGHJwQ_1K7rAunap7V2ratV2Y3RoKG3DgHJoFk/exec';

        if (!name || !lop) return alert("Vui lòng điền thông tin!");

        let score = 0;
        const questions = document.querySelectorAll('.question-box');
        
        questions.forEach(q => {
            const selected = q.querySelector('input[type="radio"]:checked');
            const radios = q.querySelectorAll('input[type="radio"]');
            
            radios.forEach(r => r.disabled = true); // Khóa đáp án

            if (selected && selected.value === "1") {
                score += 5;
                q.classList.add('correct');
            } else {
                q.classList.add('wrong');
            }
        });

        document.getElementById('status').innerText = "Đang lưu kết quả...";
        document.getElementById('submitBtn').disabled = true;

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ name, class: lop, score })
        }).then(() => {
            document.getElementById('status').innerText = `Hoàn thành! Điểm của em: ${score}`;
            document.getElementById('resetBtn').style.display = 'block';
        });
    }

    function lamLai() {
        if (confirm("Làm bài mới sẽ xóa kết quả hiển thị hiện tại?")) location.reload();
    }
</script>

</body>
</html>
