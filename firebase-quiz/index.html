<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Trắc Nghiệm - Thầy Trí</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --success: #16a34a; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 10px; }
        
        /* Thanh thông tin học sinh & Điểm số */
        .header-info { 
            position: sticky; top: 0; z-index: 100;
            background: white; padding: 15px 20px; 
            border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex; justify-content: space-between; align-items: center;
            max-width: 800px; margin: 0 auto 20px auto;
        }
        .student-inputs { display: flex; gap: 10px; flex-wrap: wrap; }
        .student-inputs input { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; outline: none; font-size: 14px; }
        .student-inputs input:focus { border-color: var(--primary); box-shadow: 0 0 5px rgba(37,99,235,0.2); }
        
        .score-display { 
            background: var(--primary); color: white; 
            padding: 10px 20px; border-radius: 8px; 
            text-align: center; min-width: 100px;
        }
        .score-display span { display: block; font-size: 1.6rem; font-weight: bold; }

        /* Vùng chứa câu hỏi */
        .quiz-container { max-width: 800px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .question-item { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #f1f5f9; }
        .question-text { font-size: 1.15rem; font-weight: 600; margin-bottom: 15px; display: block; color: #1e293b; }
        
        .option-item { display: block; padding: 12px 18px; margin: 10px 0; background: #f1f5f9; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .option-item:hover { background: #e2e8f0; }
        .option-item input { margin-right: 12px; transform: scale(1.2); cursor: pointer; }

        /* Nút bấm */
        .footer-actions { display: flex; gap: 12px; margin-top: 30px; flex-wrap: wrap; }
        .btn { flex: 1; padding: 16px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        .btn-reset { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }
        .btn-reset:hover { background: #e2e8f0; }
        .btn-submit { background: var(--success); color: white; }
        .btn-submit:hover { background: #15803d; transform: translateY(-2px); }
        .btn-submit:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }
    </style>
</head>
<body>

<div class="header-info">
    <div class="student-inputs">
        <input type="text" id="student-name" placeholder="Họ và tên học sinh..." required>
        <input type="text" id="student-class" placeholder="Lớp..." style="width: 80px;">
    </div>
    <div class="score-display">
        <small>ĐIỂM SỐ</small>
        <span id="live-score">0.0</span>
    </div>
</div>

<div class="quiz-container">
    <div id="quiz-content" style="text-align: center; color: #64748b;">Đang tải bộ đề từ Firestore...</div>
    
    <div class="footer-actions" id="actions-area" style="display: none;">
        <button class="btn btn-reset" id="btn-reload">Làm lại từ đầu</button>
        <button class="btn btn-submit" id="btn-finish">Hoàn thành & Gửi điểm</button>
    </div>
</div>

<script type="module">
    // Nhập các thư viện cần thiết từ CDN
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Cấu hình Firebase của Trí
    const firebaseConfig = {
        apiKey: "AIzaSyD9ILXGDRCiN2i4imkOC_idOvbIv26MRB0",
        authDomain: "tndemo-123.firebaseapp.com",
        projectId: "tndemo-123",
        storageBucket: "tndemo-123.firebasestorage.app",
        messagingSenderId: "1077891220132",
        appId: "1:1077891220132:web:f4f1902cbe7ba9cd46dc31",
        measurementId: "G-HK9MN35T0L"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let quizData = [];
    let currentScore = 0;

    // 1. Tải câu hỏi từ Firebase
    async function loadQuiz() {
        try {
            const querySnapshot = await getDocs(collection(db, "quiz_data"));
            const content = document.getElementById('quiz-content');
            content.innerHTML = '';
            
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                quizData.push({ id: doc.id, ...data });

                const qHtml = `
                    <div class="question-item">
                        <span class="question-text">${data['cau-hoi']}</span>
                        <div>
                            ${data['phuong-an'].map((opt, idx) => `
                                <label class="option-item">
                                    <input type="radio" name="${doc.id}" value="${idx}" class="quiz-radio"> ${opt}
                                </label>
                            `).join('')}
                        </div>
                    </div>`;
                content.insertAdjacentHTML('beforeend', qHtml);
            });

            document.getElementById('actions-area').style.display = 'flex';
            
            // Lắng nghe sự kiện chọn đáp án để tính điểm ngay
            document.querySelectorAll('.quiz-radio').forEach(radio => {
                radio.addEventListener('change', calculateScore);
            });
        } catch (e) {
            document.getElementById('quiz-content').innerHTML = "Lỗi kết nối dữ liệu: " + e.message;
        }
    }

    // 2. Hàm tính điểm theo thời gian thực (Real-time)
    function calculateScore() {
        let correctCount = 0;
        quizData.forEach(q => {
            const selected = document.querySelector(`input[name="${q.id}"]:checked`);
            if (selected && parseInt(selected.value) === parseInt(q['dap-an'])) {
                correctCount++;
            }
        });
        currentScore = (correctCount / quizData.length) * 10;
        document.getElementById('live-score').innerText = currentScore.toFixed(1);
    }

    // 3. Nút làm lại
    document.getElementById('btn-reload').onclick = () => {
        if(confirm("Xóa bài làm và tải lại từ đầu?")) location.reload();
    };

    // 4. Gửi kết quả lên Collection 'bang-diem'
    document.getElementById('btn-finish').onclick = async () => {
        const name = document.getElementById('student-name').value.trim();
        const lop = document.getElementById('student-class').value.trim();
        const btn = document.getElementById('btn-finish');

        if(!name) {
            alert("Vui lòng nhập Họ tên trước khi nộp bài!");
            document.getElementById('student-name').focus();
            return;
        }

        try {
            btn.disabled = true;
            btn.innerText = "Đang gửi kết quả...";

            // Lưu vào Firebase với Auto-ID (khớp với field: ho-ten, lop, diem, thoi-gian)
            await addDoc(collection(db, "bang-diem"), {
                "ho-ten": name,
                "lop": lop,
                "diem": parseFloat(currentScore.toFixed(1)),
                "thoi-gian": serverTimestamp()
            });

            alert(`Nộp bài thành công! Điểm của ${name} là: ${currentScore.toFixed(1)}`);
            location.reload(); 
        } catch (error) {
            alert("Lỗi khi nộp bài: " + error.message);
            btn.disabled = false;
            btn.innerText = "Hoàn thành & Gửi điểm";
        }
    };

    loadQuiz();
</script>
</body>
</html>
